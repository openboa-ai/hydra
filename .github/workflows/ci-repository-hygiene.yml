name: ci / repository hygiene

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  repository-quality:
    name: shell, workflows, manifests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ACTIONLINT_VERSION: v1.7.12

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install quality tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          python3 -m pip install --user pre-commit==4.1.0
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check shell syntax
        run: |
          bash -n \
            hydra \
            install.sh \
            .githooks/commit-msg \
            .githooks/pre-commit \
            .githooks/pre-push \
            scripts/check-apache-compliance.sh \
            scripts/check-conventional-title.sh \
            scripts/check-gitleaks.sh \
            scripts/setup-git-hooks.sh

      - name: Check Ruby scripts
        run: ruby -c scripts/update-homebrew-formula.rb

      - name: Check CLI help shape
        run: |
          ./hydra --help | tee hydra-help.txt
          grep -F "hydra <command> [options]" hydra-help.txt
          if grep -F "hydra <project>" hydra-help.txt; then
            echo "top-level help must not expose hydra <project> shorthand" >&2
            exit 1
          fi
          ./hydra run --help | grep -F "hydra run <project>"
          if ./hydra openboa 2>unknown.err; then
            echo "hydra <project> shorthand should not dispatch" >&2
            exit 1
          fi
          grep -F "unknown command: openboa" unknown.err

      - name: Check diagnostics preflight shape
        run: |
          tmp_home="$(mktemp -d)"
          mkdir -p "${tmp_home}/projects/demo"
          cat > "${tmp_home}/projects/demo/WORKFLOW.md" <<'EOF'
          ---
          project:
            name: Demo
            key: demo
            repo: https://github.com/openboa-ai/openboa.git
          worker:
            sbx:
              enabled: true
          tracker:
            kind: linear
            api_key: $LINEAR_API_KEY
            project_slug: demo
          ---
          Demo workflow.
          EOF
          HYDRA_HOME="${tmp_home}" ./hydra doctor --json > doctor.json || true
          ruby -rjson -e 'data = JSON.parse(File.read("doctor.json")); abort "missing ok" unless data.key?("ok")'
          if HYDRA_HOME="${tmp_home}" ./hydra run demo --no-web-dashboard --no-terminal-dashboard > run.out 2>&1; then
            echo "expected preflight to fail without runtime credentials" >&2
            exit 1
          fi
          grep -F "hydra: preflight demo" run.out
          grep -F "preflight: failed" run.out
          grep -F "codex_runtime: missing" run.out

      - name: Check shell scripts
        run: |
          shellcheck -S warning \
            hydra \
            install.sh \
            .githooks/commit-msg \
            .githooks/pre-commit \
            .githooks/pre-push \
            scripts/check-apache-compliance.sh \
            scripts/check-conventional-title.sh \
            scripts/check-gitleaks.sh \
            scripts/setup-git-hooks.sh

      - name: Check git hook executability
        run: test -x .githooks/commit-msg -a -x .githooks/pre-commit -a -x .githooks/pre-push -a -x scripts/setup-git-hooks.sh

      - name: Validate pre-commit config
        run: pre-commit validate-config

      - name: Validate commit convention checker
        run: |
          scripts/check-conventional-title.sh --message "ci: validate repository quality gates"

      - name: Check GitHub Actions workflows
        run: actionlint -color

      - name: Check JSON manifests
        run: |
          ruby -rjson -e 'ARGV.each { |path| JSON.parse(File.read(path)); puts "json: #{path}" }' \
            .agents/plugins/marketplace.json \
            plugins/hydra/.codex-plugin/plugin.json \
            plugins/hydra/hooks/hooks.json \
            plugins/hydra/.mcp.json

      - name: Check repository compliance
        run: scripts/check-apache-compliance.sh --worktree
