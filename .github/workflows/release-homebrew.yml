name: release / homebrew formula

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: CalVer tag to publish, for example v2026.05.02.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-homebrew-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  open-formula-pr:
    name: open formula update PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vYYYY.MM.DD.N, got: ${RELEASE_TAG}"
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          asset_name="openboa-hydra-${version}.tar.gz"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${asset_name}"

          {
            echo "tag=${RELEASE_TAG}"
            echo "version=${version}"
            echo "asset_name=${asset_name}"
            echo "asset_url=${asset_url}"
            echo "branch=automation/homebrew-${RELEASE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release token
        env:
          HYDRA_RELEASE_TOKEN: ${{ secrets.HYDRA_RELEASE_TOKEN }}
        run: |
          if [ -z "$HYDRA_RELEASE_TOKEN" ]; then
            echo "::error::HYDRA_RELEASE_TOKEN is required to open a Homebrew formula PR."
            echo "::error::Use a fine-grained PAT or GitHub App token with contents:write and pull_requests:write."
            exit 1
          fi

      - name: Publish source release asset
        id: asset
        env:
          GH_TOKEN: ${{ secrets.HYDRA_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          ASSET_NAME: ${{ steps.release.outputs.asset_name }}
        run: |
          asset_path="${RUNNER_TEMP}/${ASSET_NAME}"

          if gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | grep -Fx "$ASSET_NAME" >/dev/null; then
            gh release download "$RELEASE_TAG" --pattern "$ASSET_NAME" --dir "$RUNNER_TEMP"
          else
            git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            git archive --format=tar.gz --prefix="openboa-hydra-${RELEASE_VERSION}/" "$RELEASE_TAG" -o "$asset_path"
            gh release upload "$RELEASE_TAG" "$asset_path"
          fi

          sha256="$(sha256sum "$asset_path" | awk '{print $1}')"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          scripts/update-homebrew-formula.rb \
            --tag "${{ steps.release.outputs.tag }}" \
            --url "${{ steps.release.outputs.asset_url }}" \
            --sha256 "${{ steps.asset.outputs.sha256 }}" \
            --formula Formula/openboa-hydra.rb

      - name: Create or update formula PR
        id: formula-pr
        env:
          GH_TOKEN: ${{ secrets.HYDRA_RELEASE_TOKEN }}
          FORMULA_BRANCH: ${{ steps.release.outputs.branch }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if git diff --quiet -- Formula/openboa-hydra.rb; then
            echo "Formula already points at ${RELEASE_TAG}."
            exit 0
          fi

          title="build(homebrew): update formula to ${RELEASE_TAG}"
          body_file="$(mktemp)"

          cat > "$body_file" <<EOF
          #### Context

          GitHub Release ${RELEASE_TAG} was published, so the Homebrew formula needs to point at its release source asset.

          #### TL;DR

          *Updates openboa-hydra to ${RELEASE_VERSION}.*

          #### Summary

          - Update Formula/openboa-hydra.rb to ${RELEASE_TAG}.
          - Set the release source asset URL and SHA256 checksum.

          #### Alternatives

          - Track main or a release branch: rejected because branches are mutable.

          #### Test Plan

          - [x] Generated by release / homebrew formula.
          - [ ] Required PR checks must pass before merge.
          EOF

          sed -i 's/^          //' "$body_file"

          git config user.name "openboa-release-bot"
          git config user.email "openboa-release-bot@users.noreply.github.com"
          git switch -c "$FORMULA_BRANCH"
          git add Formula/openboa-hydra.rb
          git commit -m "$title"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "HEAD:${FORMULA_BRANCH}"

          pr_url="$(gh pr list --base main --head "$FORMULA_BRANCH" --state open --json url --jq '.[0].url // empty')"
          if [ -z "$pr_url" ]; then
            pr_url="$(gh pr create --base main --head "$FORMULA_BRANCH" --title "$title" --body-file "$body_file")"
          else
            gh pr edit "$pr_url" --title "$title" --body-file "$body_file"
          fi

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Enable formula PR auto-merge
        if: ${{ steps.formula-pr.outputs.pr_url != '' }}
        env:
          GH_TOKEN: ${{ secrets.HYDRA_RELEASE_TOKEN }}
        run: |
          gh pr merge "${{ steps.formula-pr.outputs.pr_url }}" --auto --squash --delete-branch
