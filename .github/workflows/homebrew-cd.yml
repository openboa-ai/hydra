name: homebrew-cd

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: homebrew-cd-main
  cancel-in-progress: false

jobs:
  bump-formula-version:
    if: ${{ !startsWith(github.event.head_commit.message, 'Bump Homebrew formula for ') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ github.token }}

      - name: Bump main formula version
        env:
          FORMULA_VERSION: "0.1.0.${{ github.run_number }}"
        run: |
          ruby -e '
            path = "Formula/openboa-hydra.rb"
            version = ENV.fetch("FORMULA_VERSION")
            formula = File.read(path)
            updated = formula.sub(/^  version "[^"]+"/, %(  version "#{version}"))
            abort "version line not found in #{path}" if updated == formula
            File.write(path, updated)
          '

      - name: Commit formula bump
        run: |
          if git diff --quiet -- Formula/openboa-hydra.rb; then
            echo "Formula version already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/openboa-hydra.rb
          git commit -m "Bump Homebrew formula for ${GITHUB_SHA::7}"
          git push
